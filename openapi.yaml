components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: '0000'
    LoginResponse:
      type: object
      required:
        - message
        - token
      properties:
        message:
          type: string
        token:
          type: string
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    Testcase:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: test-1
        link:
          type: string
          example: https://github.com/free5gc/free5gc#test-1
    GetTestcasesResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Testcases retrieved successfully
        testcases:
          type: array
          items:
            $ref: '#/components/schemas/Testcase'
    TaskSimple:
      type: object
      required:
        - id
        - username
        - createTime
      properties:
        id:
          type: integer
          format: uint64
          example: 1
        username:
          type: string
          example: admin
        createTime:
          type: integer
          format: int64
          example: 1777143861
    NfPr:
      type: object
      required:
        - nfName
        - pr
      properties:
        nfName:
          type: string
          example: amf
        pr:
          type: integer
          example: 100
    ResponseGetTasks:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Tasks retrieved successfully
        pendingTask:
          type: array
          items:
            $ref: '#/components/schemas/TaskSimple'
        ongoingTask:
          type: array
          items:
            $ref: '#/components/schemas/TaskSimple'
        historyTask:
          type: array
          items:
            $ref: '#/components/schemas/TaskSimple'
    ResponseGetTask:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Task retrieved successfully
        id:
          type: integer
          format: uint64
          example: 1
        username:
          type: string
          example: admin
        createTime:
          type: integer
          format: int64
          example: 1777143861
        status:
          type: string
          enum:
            - pending
            - running
            - success
            - failed
            - canceled
          example: success
        tests:
          type: array
          items:
            type: string
          example:
            - test-1
            - test-2
        nfPrList:
          type: array
          items:
            $ref: '#/components/schemas/NfPr'
    ResponseGetTestLog:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Test log retrieved successfully
        log:
          type: string
          example: test log content
    RequestSubmitTask:
      type: object
      required:
        - tests
        - nfPrList
      properties:
        tests:
          type: array
          items:
            type: string
          example:
            - test-1
            - test-2
        nfPrList:
          type: array
          items:
            $ref: '#/components/schemas/NfPr'
    AddTestcasesRequest:
      type: object
      required:
        - testcases
      properties:
        testcases:
          type: array
          items:
            $ref: '#/components/schemas/Testcase'
    DeleteTestcasesRequest:
      type: object
      required:
        - testcases
      properties:
        testcases:
          type: array
          items:
            $ref: '#/components/schemas/Testcase'
    Tenant:
      type: object
      required:
        - username
        - role
      properties:
        username:
          type: string
          example: alonza
        role:
          type: string
          example: admin
    GetTenantsResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Tenants retrieved successfully
        tenants:
          type: array
          items:
            $ref: '#/components/schemas/Tenant'
    AddTenantsRequest:
      type: object
      required:
        - tenants
      properties:
        tenants:
          type: array
          items:
            $ref: '#/components/schemas/Tenant'
    DeleteTenantsRequest:
      type: object
      required:
        - tenants
      properties:
        tenants:
          type: array
          items:
            $ref: '#/components/schemas/Tenant'
    PR:
      type: object
      required:
        - number
        - title
      properties:
        number:
          type: integer
          example: 212
        title:
          type: string
          example: "gmm/handler: reject EAP-AKA' AuthenticationResponse with no EAPMessage"
    GetGithubPRsResponse:
      type: object
      required:
        - message
        - prs
      properties:
        message:
          type: string
          example: PRs retrieved successfully
        prs:
          type: array
          items:
            $ref: '#/components/schemas/PR'
    Runner:
      type: object
      required:
        - name
        - ip
        - onGoingTask
        - status
      properties:
        name:
          type: string
          example: runner
        ip:
          type: string
          example: 10.0.0.1
        onGoingTask:
          type: integer
          example: 0
        status:
          type: string
          example: offline
    GetRunnersResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Runners retrieved successfully
        runners:
          type: array
          items:
            $ref: '#/components/schemas/Runner'
    RegisterRunnerRequest:
      type: object
      required:
        - name
        - ip
      properties:
        name:
          type: string
          example: runner
        ip:
          type: string
          example: 10.0.0.1
    ResponseRegisterRunner:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Runner registered successfully
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    RequestRunnerHeartbeat:
      type: object
      required:
        - idle
      properties:
        idle:
          type: boolean
          example: true
        onGoingTask:
          type: integer
          format: uint64
          minimum: 0
          example: 0
    ResponseRunnerHeartbeat:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Runner heartbeat successful
        id:
          type: integer
          format: uint64
          example: 17
        tests:
          type: array
          items:
            type: string
          example:
            - TestRegistration
            - TestGUTIRegistration
        nfPrList:
          type: array
          items:
            $ref: '#/components/schemas/NfPr'
    RequestTestOutput:
      type: object
      required:
        - endFlag
        - id
      properties:
        endFlag:
          type: boolean
          example: false
        id:
          type: integer
          format: uint64
          minimum: 1
          example: 20
        testName:
          type: string
          example: TestRegistration
        success:
          type: boolean
          example: true
        log:
          type: string
          example: this is the log of TestRegistration